name: e2e test

on: issues

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Issue Forms Body Parser
        id: parse
        uses: ./
      - name: Print parsed data
        env:
          DATA: ${{ steps.parse.outputs.data }}
        run: echo "$DATA"

      - name: Read an issue content
        id: read_issue
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat ./test/test-issue-3.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Issue Forms Body Parser With Provided Body
        id: parse_with_body
        uses: ./
        with:
          body: ${{ steps.read_issue.outputs.body }}
      - name: Print parsed data with body
        env:
          DATA: ${{ steps.parse_with_body.outputs.data }}
        run: echo "$DATA"
